apiVersion: v1
kind: Service
metadata:
  name: sts-a
  namespace: pdb-lab
spec:
  clusterIP: None
  selector:
    app: sts-a
  ports:
  - name: web
    port: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sts-a
  namespace: pdb-lab
spec:
  serviceName: sts-a
  replicas: 3
  selector:
    matchLabels:
      app: sts-a
  template:
    metadata:
      labels:
        app: sts-a
    spec:
      nodeSelector:
        drain-target: "true"
      terminationGracePeriodSeconds: 10
      containers:
      - name: app
        image: nginx:1.27
        ports:
        - containerPort: 80
          name: web
---
